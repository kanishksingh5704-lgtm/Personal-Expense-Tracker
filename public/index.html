<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Personal Finance Tracker — Track expenses, income, get AI insights, and generate reports.">
  <title>FinanceFlow — Personal Finance Tracker</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- App Shell -->
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <i data-lucide="wallet" class="logo-lucide"></i>
          </div>
          <div class="logo-text">
            <h1>FinanceFlow</h1>
            <span class="logo-subtitle">Personal Tracker</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-view="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard</span>
        </a>
        <a href="#transactions" class="nav-item" data-view="transactions">
          <i data-lucide="arrow-left-right"></i>
          <span>Transactions</span>
        </a>
        <a href="#reports" class="nav-item" data-view="reports">
          <i data-lucide="bar-chart-3"></i>
          <span>Reports</span>
        </a>
        <a href="#insights" class="nav-item" data-view="insights">
          <i data-lucide="brain"></i>
          <span>AI Insights</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-card">
          <i data-lucide="sparkles" class="sparkle-icon"></i>
          <p>AI-powered insights analyze your spending patterns</p>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="main-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle">
            <i data-lucide="menu"></i>
          </button>
          <div class="header-info">
            <h2 id="viewTitle">Dashboard</h2>
            <p id="headerDate" class="header-date"></p>
          </div>
        </div>
        <div class="header-right">
          <button class="btn btn-primary btn-add" id="addTransactionBtn">
            <i data-lucide="plus"></i>
            <span>Add Transaction</span>
          </button>
        </div>
      </header>

      <!-- View Container -->
      <div class="view-container" id="viewContainer">
        <!-- Views are rendered dynamically by JS -->
        <div class="loading-skeleton">
          <div class="skeleton-cards">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
          <div class="skeleton-chart"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Transaction Modal -->
  <div class="modal-overlay" id="transactionModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Transaction</h3>
        <button class="modal-close" id="modalClose">
          <i data-lucide="x"></i>
        </button>
      </div>
      <form id="transactionForm">
        <input type="hidden" id="transactionId">
        <div class="form-group">
          <label>Type</label>
          <div class="type-toggle">
            <button type="button" class="type-btn active" data-type="expense">
              <i data-lucide="trending-down"></i> Expense
            </button>
            <button type="button" class="type-btn" data-type="income">
              <i data-lucide="trending-up"></i> Income
            </button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="txnAmount">Amount ($)</label>
            <input type="number" id="txnAmount" step="0.01" min="0.01" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label for="txnDate">Date</label>
            <input type="date" id="txnDate" required>
          </div>
        </div>
        <div class="form-group">
          <label for="txnCategory">Category</label>
          <select id="txnCategory" required>
            <option value="">Select category...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="txnDescription">Description</label>
          <input type="text" id="txnDescription" placeholder="Enter a description..." maxlength="100">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <i data-lucide="check"></i>
            <span id="modalSubmitText">Add Transaction</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Delete Transaction</h3>
        <button class="modal-close" id="deleteModalClose">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="delete-warning">
          <i data-lucide="alert-triangle" class="delete-icon"></i>
          <p>Are you sure you want to delete this transaction? This action cannot be undone.</p>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">
          <i data-lucide="trash-2"></i>
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/transactions.js"></script>
  <script src="/js/reports.js"></script>
  <script src="/js/insights.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
